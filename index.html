<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBTI Sync Pro - Tes Kepribadian Real-time</title>
    <!-- Tailwind CSS untuk Styling Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React dan React DOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel untuk kompilasi JSX langsung di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Firebase SDK Legacy/Compat (Mudah dijalankan di single file HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- Container Utama untuk me-render React App -->
    <div id="root"></div>

    <script type="text/babel">
        // --- KONFIGURASI FIREBASE ---
        // Jika Anda belum membuat Firebase, sistem akan menggunakan LocalStorage otomatis sebagai fallback aman
        const firebaseConfig = {
            apiKey: "",
            authDomain: "mbti-test-demo.firebaseapp.com",
            projectId: "mbti-test-demo",
            storageBucket: "mbti-test-demo.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123xyz"
        };

        let db = null;
        try {
            if (firebaseConfig.authDomain !== "mbti-test-demo.firebaseapp.com") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            }
        } catch (e) {
            console.warn("Firebase tidak diaktifkan. Menggunakan penyimpanan lokal.");
        }

        // --- DATA SOAL TES MBTI (24 Soal Seimbang) ---
        const questions = [
            // E (Extraversion) vs I (Introversion)
            { id: 1, text: "Anda sangat menikmati berada di acara sosial atau pertemuan yang ramai dengan banyak orang.", type: "EI", direction: 1 },
            { id: 2, text: "Anda lebih memilih menghabiskan waktu luang sendirian dengan membaca, menonton, atau hobi pribadi.", type: "EI", direction: -1 },
            { id: 3, text: "Anda adalah orang yang mudah memulai percakapan terlebih dahulu dengan orang asing.", type: "EI", direction: 1 },
            { id: 4, text: "Anda merasa kehabisan energi (lelah secara mental) setelah bersosialisasi dalam waktu lama.", type: "EI", direction: -1 },
            { id: 5, text: "Anda merasa lebih produktif bekerja dalam kelompok daripada bekerja sendirian.", type: "EI", direction: 1 },
            { id: 6, text: "Anda lebih suka mendengarkan orang lain berbicara daripada menjadi pusat perhatian.", type: "EI", direction: -1 },

            // S (Sensing) vs N (Intuition)
            { id: 7, text: "Anda lebih tertarik pada fakta-fakta konkret dan dunia nyata dibanding ide-ide teoretis atau abstrak.", type: "SN", direction: 1 },
            { id: 8, text: "Anda sering membayangkan masa depan dan memikirkan berbagai kemungkinan baru yang kreatif.", type: "SN", direction: -1 },
            { id: 9, text: "Anda lebih suka melakukan pekerjaan dengan instruksi langkah-demi-langkah yang sudah jelas jalurnya.", type: "SN", direction: 1 },
            { id: 10, text: "Anda menyukai simbolisme, metafora, dan sering mencari makna tersirat di balik setiap kejadian.", type: "SN", direction: -1 },
            { id: 11, text: "Anda sangat fokus pada detail praktis yang ada saat ini dibanding visi jangka panjang.", type: "SN", direction: 1 },
            { id: 12, text: "Anda cepat bosan dengan rutinitas dan selalu mencari cara-cara baru yang tidak konvensional.", type: "SN", direction: -1 },

            // T (Thinking) vs F (Feeling)
            { id: 13, text: "Dalam mengambil keputusan penting, logika objektif harus selalu diutamakan dibanding perasaan.", type: "TF", direction: 1 },
            { id: 14, text: "Anda sangat berempati dan mudah terpengaruh oleh suasana hati serta emosi orang di sekitar Anda.", type: "TF", direction: -1 },
            { id: 15, text: "Anda lebih suka bersikap jujur dan apa adanya daripada berbohong demi menjaga perasaan orang lain.", type: "TF", direction: 1 },
            { id: 16, text: "Anda memprioritaskan keharmonisan kelompok daripada harus memenangkan suatu argumen atau perdebatan.", type: "TF", direction: -1 },
            { id: 17, text: "Anda mengagumi orang yang bertindak secara rasional, analitis, dan mengesampingkan drama emosional.", type: "TF", direction: 1 },
            { id: 18, text: "Anda sering membuat keputusan berdasarkan insting atau apa yang dirasa benar di dalam hati.", type: "TF", direction: -1 },

            // J (Judging) vs P (Perceiving)
            { id: 19, text: "Anda selalu membuat rencana atau jadwal harian/mingguan yang teratur dan berusaha mematuhinya.", type: "JP", direction: 1 },
            { id: 20, text: "Anda lebih suka bekerja secara fleksibel dan spontan, bahkan di bawah tekanan waktu (SKS).", type: "JP", direction: -1 },
            { id: 21, text: "Bagi Anda, menyelesaikan tugas pekerjaan sebelum bermain adalah aturan hidup yang mutlak.", type: "JP", direction: 1 },
            { id: 22, text: "Anda merasa terkekang jika hari-hari Anda diatur oleh jadwal yang terlalu kaku dan ketat.", type: "JP", direction: -1 },
            { id: 23, text: "Anda merasa sangat tenang dan puas setelah menyelesaikan keputusan atau rencana perjalanan secara detail.", type: "JP", direction: 1 },
            { id: 24, text: "Anda suka membiarkan berbagai pilihan tetap terbuka hingga menit-menit terakhir sebelum bertindak.", type: "JP", direction: -1 }
        ];

        const mbtiDetails = {
            ISTJ: { title: "Logistik / Inspektur", desc: "Individu yang praktis, mengutamakan fakta, sangat andal, dan berdedikasi tinggi pada aturan serta tradisi.", strengths: ["Jujur & Langsung", "Bertanggung Jawab", "Sangat Detail", "Tenang & Praktis"], weaknesses: ["Keras Kepala", "Kurang Sensitif terhadap Emosi", "Terlalu Kaku", "Suka Menyalahkan Diri"], careers: ["Akuntan", "Analis Keuangan", "Polisi/Militer", "Manajer Operasional"] },
            ISFJ: { title: "Pembela / Pelindung", desc: "Pribadi yang sangat hangat, penuh kasih, protektif, dan selalu siap membela orang-orang terdekat mereka.", strengths: ["Sangat Suportif", "Dapat Diandalkan", "Sangat Peka", "Pekerja Keras & Setia"], weaknesses: ["Terlalu Rendah Hati", "Terlalu Memendam Perasaan", "Sulit Menolak", "Gampang Stres"], careers: ["Perawat / Tenaga Medis", "Guru/Pendidik", "Pekerja Sosial", "Customer Service"] },
            INFJ: { title: "Advokat / Konselor", desc: "Tipe kepribadian paling langka. Idealis yang mistis namun sangat teratur, memiliki visi mendalam tentang manusia.", strengths: ["Kreatif", "Sangat Berprinsip", "Penuh Empati & Wawasan", "Bersemangat"], weaknesses: ["Sensitif terhadap Kritik", "Sangat Tertutup", "Perfeksionis", "Mudah Burnout"], careers: ["Penulis", "Psikolog / Konselor", "Aktivis Kemanusiaan", "HRD Specialist"] },
            INTJ: { title: "Arsitek / Ahli Strategi", desc: "Pemikir taktis yang imajinatif sekaligus bertekad kuat, sangat mandiri, dan mencintai efisiensi tinggi.", strengths: ["Berpikiran Logis & Analitis", "Sangat Mandiri", "Inovatif", "Berpengetahuan Luas"], weaknesses: ["Sering Terlihat Arogan", "Terlalu Kritis", "Kurang Peka secara Sosial", "Overthinking"], careers: ["Software Engineer", "Ilmuwan / Peneliti", "Ahli Strategi Bisnis", "Arsitek"] },
            ISTP: { title: "Pengrajin / Virtuoso", desc: "Eksperimenter yang berani dan praktis, ahli dalam menguasai segala jenis alat, mekanika, dan pemecahan masalah instan.", strengths: ["Optimis & Energetik", "Sangat Praktis", "Spontan & Kreatif", "Bagus dalam Krisis"], weaknesses: ["Sangat Keras Kepala", "Suka Menyendiri", "Mudah Bosan", "Kurang Suka Komitmen Kaku"], careers: ["Teknisi / Mekanik", "Pilot", "Ahli Forensik", "Pemadam Kebakaran"] },
            ISFP: { title: "Petualang / Seniman", desc: "Seniman yang fleksibel, menawan, selalu siap mengeksplorasi hal-hal baru dan mengekspresikan diri lewat karya nyata.", strengths: ["Sangat Menawan", "Sensitif terhadap Estetika", "Imajinatif", "Sangat Fleksibel"], weaknesses: ["Sangat Mandiri", "Sulit Diprediksi", "Mudah Stres", "Terlalu Kompetitif"], careers: ["Desainer Grafis", "Fotografer", "Koki / Chef", "Musisi / Pekerja Seni"] },
            INFP: { title: "Mediator / Idealis", desc: "Pribadi yang puitis, baik hati, altruistik, dan selalu bersemangat membantu tujuan-tujuan kemanusiaan yang baik.", strengths: ["Sangat Peduli & Empati", "Sangat Kreatif", "Berpikiran Terbuka", "Berkomitmen Tinggi"], weaknesses: ["Terlalu Idealis", "Sering Mengabaikan Fakta", "Terlalu Sensitif", "Sulit Didekati"], careers: ["Penulis / Novelis", "Psikolog", "Penerjemah Bahasa", "Pekerja Seni Kreatif"] },
            INTP: { title: "Logis / Pemikir", desc: "Penemu yang kreatif dengan rasa ingin tahu tinggi, sangat tertarik pada teori, sains, dan struktur analitis.", strengths: ["Sangat Analitis", "Orisinal & Kreatif", "Berpikiran Terbuka", "Sangat Jujur"], weaknesses: ["Sering Ragu-ragu", "Kurang Peka Perasaan", "Pelupa / Sulit Fokus", "Suka Meragukan Diri"], careers: ["Programmer / Data Scientist", "Fisikawan", "Analis Keamanan Siber", "Konsultan IT"] },
            ESTP: { title: "Pengusaha / Dinamis", desc: "Orang yang cerdas, bertenaga, sangat ramah, dan sangat menikmati hidup di tepi jurang aksi nyata dan petualangan.", strengths: ["Berani & Tegas", "Sangat Rasional", "Keterampilan Sosial Hebat", "Peka Perubahan"], weaknesses: ["Kurang Peka Perasaan", "Suka Risiko Berbahaya", "Tidak Suka Aturan Ketat", "Sering Tertinggal Detail"], careers: ["Wirausahawan", "Sales / Marketing", "Pialang Saham", "Detektif / Agen Rahasia"] },
            ESFP: { title: "Penghibur / Sosialis", desc: "Orang yang spontan, energik, bersemangat, dan selalu membuat suasana di sekitar mereka menjadi ceria dan hidup.", strengths: ["Sangat Menarik", "Suka Membantu Praktis", "Sosial Luar Biasa", "Sensitif Estetika"], weaknesses: ["Mudah Bosan", "Sulit Rencana Masa Depan", "Kurang Fokus Analisis", "Sensitif terhadap Konflik"], careers: ["Event Planner", "Aktor / Aktris", "Public Relations", "Pemandu Wisata"] },
            ENFP: { title: "Juru Kampanye / Inspirator", desc: "Jiwa yang bebas, antusias, kreatif, komunikator ulung, dan selalu bisa menemukan alasan untuk tersenyum.", strengths: ["Sangat Kreatif", "Penuh Energi", "Komunikator Ulung", "Sangat Ramah"], weaknesses: ["Sulit Menjaga Fokus", "Sangat Butuh Persetujuan", "Overthinking", "Mudah Stres"], careers: ["Content Creator", "Jurnalis", "Manajer Pemasaran", "Motivator"] },
            ENTP: { title: "Debat / Visioner", desc: "Pemikir cerdas yang tidak bisa menolak tantangan intelektual, sangat suka menganalisis argumen dari berbagai sudut.", strengths: ["Sangat Cerdas", "Pemikir Cepat", "Sangat Karismatik", "Suka Solusi Baru"], weaknesses: ["Sangat Suka Berdebat", "Kurang Toleran", "Sulit Fokus Implementasi", "Kurang Peka"], careers: ["Konsultan Bisnis", "Pengacara", "Product Manager", "Wirausahawan"] },
            ESTJ: { title: "Eksekutif / Administrator", desc: "Administrator ulung, tidak tertandingi dalam mengelola segala sesuatu, baik itu orang, aturan, maupun proyek.", strengths: ["Sangat Terorganisir", "Setia & Berdedikasi", "Jujur & Terpercaya", "Pembuat Ketertiban"], weaknesses: ["Kaku & Keras Kepala", "Sulit Terima Perubahan", "Terlalu Menuntut", "Kurang Ekspresif"], careers: ["Manajer Proyek", "Direktur Keuangan", "Kepala Sekolah", "Pejabat Pemerintah"] },
            ESFJ: { title: "Konsul / Penyedia", desc: "Orang-orang yang sangat sosial, peduli, populer, dan selalu bersemangat membantu sesama serta menjaga komunitas.", strengths: ["Rasa Tanggung Jawab Kuat", "Sangat Setia & Peduli", "Hebat Menjalin Hubungan", "Sangat Hangat"], weaknesses: ["Khawatir Status Sosial", "Sering Butuh Pujian", "Tidak Suka Perubahan Keras", "Menolak Konflik"], careers: ["Guru Sekolah", "Pekerja Sosial Medis", "Manajer HRD", "Hubungan Masyarakat"] },
            ENFJ: { title: "Protagonis / Pemimpin Karismatik", desc: "Pemimpin karismatik yang penuh inspirasi, mampu memikat pendengar dan memotivasi orang untuk mencapai potensi terbaik.", strengths: ["Sangat Karismatik", "Sangat Peduli", "Komunikator Ulung", "Pemimpin Alami"], weaknesses: ["Terlalu Idealistis", "Terlalu Peka Kritik", "Sering Korban Diri", "Sulit Keputusan Keras"], careers: ["Guru / Profesor", "Pemimpin Organisasi", "Konselor", "Aktivis LSM"] },
            ENTJ: { title: "Komandan / Pemimpin Strategis", desc: "Pemimpin visioner yang berani, bertekad kuat, selalu menemukan jalan atau menciptakan jalan baru untuk kesuksesan.", strengths: ["Sangat Efisien", "Percaya Diri Tinggi", "Bertekad Kuat", "Pemikir Strategis"], weaknesses: ["Keras Kepala", "Kurang Sabar", "Kurang Peka Emosi", "Sering Terlihat Kejam"], careers: ["CEO / Direktur Utama", "Konsultan Manajemen", "Venture Capitalist", "Pengacara Korporasi"] }
        };

        function App() {
            const [step, setStep] = React.useState('welcome'); // welcome, test, result, admin
            const [userData, setUserData] = React.useState({ name: '', email: '', whatsapp: '' });
            const [answers, setAnswers] = React.useState({});
            const [currentQIndex, setCurrentQIndex] = React.useState(0);
            const [resultMBTI, setResultMBTI] = React.useState(null);
            const [savedSubmissions, setSavedSubmissions] = React.useState([]);
            const [adminPassword, setAdminPassword] = React.useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [adminError, setAdminError] = React.useState('');
            const [scorePercentages, setScorePercentages] = React.useState({ EI: 50, SN: 50, TF: 50, JP: 50 });

            // Mengambil data awal dari LocalStorage sebagai fallback offline
            React.useEffect(() => {
                const localData = localStorage.getItem('mbti_submissions');
                if (localData) {
                    setSavedSubmissions(JSON.parse(localData));
                }

                // Jika Firebase aktif, sinkronisasikan data secara real-time
                if (db) {
                    const unsubscribe = db.collection('mbti_submissions').onSnapshot((snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => {
                            data.push({ id: doc.id, ...doc.data() });
                        });
                        data.sort((a, b) => b.timestamp - a.timestamp);
                        setSavedSubmissions(data);
                        localStorage.setItem('mbti_submissions', JSON.stringify(data));
                    });
                    return () => unsubscribe();
                }
            }, []);

            const handleStartTest = (e) => {
                e.preventDefault();
                if (!userData.name.trim() || !userData.email.trim()) {
                    alert("Nama Lengkap dan Email harus diisi!");
                    return;
                }
                setStep('test');
                setCurrentQIndex(0);
                setAnswers({});
            };

            const handleAnswerSelect = (score) => {
                const currentQ = questions[currentQIndex];
                setAnswers(prev => ({ ...prev, [currentQ.id]: score }));
                setTimeout(() => {
                    if (currentQIndex < questions.length - 1) {
                        setCurrentQIndex(prev => prev + 1);
                    }
                }, 150);
            };

            const calculateResult = async () => {
                let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
                questions.forEach(q => {
                    const answerVal = answers[q.id] || 0;
                    scores[q.type] += answerVal * q.direction;
                });

                const getPercentage = (score) => Math.round(((score + 12) / 24) * 100);

                const eiPct = getPercentage(scores.EI);
                const snPct = getPercentage(scores.SN);
                const tfPct = getPercentage(scores.TF);
                const jpPct = getPercentage(scores.JP);

                setScorePercentages({ EI: eiPct, SN: snPct, TF: tfPct, JP: jpPct });

                const mbtiString = [
                    eiPct >= 50 ? 'E' : 'I',
                    snPct >= 50 ? 'S' : 'N',
                    tfPct >= 50 ? 'T' : 'F',
                    jpPct >= 50 ? 'J' : 'P'
                ].join('');

                setResultMBTI(mbtiString);

                const submission = {
                    name: userData.name,
                    email: userData.email,
                    whatsapp: userData.whatsapp || '-',
                    mbti: mbtiString,
                    percentages: { E: eiPct, I: 100 - eiPct, S: snPct, N: 100 - snPct, T: tfPct, F: 100 - tfPct, J: jpPct, P: 100 - jpPct },
                    timestamp: Date.now(),
                    formattedDate: new Date().toLocaleDateString('id-ID', {
                        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    })
                };

                // Menyimpan data hasil
                const updatedList = [submission, ...savedSubmissions];
                setSavedSubmissions(updatedList);
                localStorage.setItem('mbti_submissions', JSON.stringify(updatedList));

                if (db) {
                    try {
                        await db.collection('mbti_submissions').add(submission);
                    } catch (e) {
                        console.error("Gagal simpan ke cloud database:", e);
                    }
                }

                setStep('result');
            };

            const exportToExcel = () => {
                if (savedSubmissions.length === 0) {
                    alert("Belum ada data untuk diekspor!");
                    return;
                }

                let csvContent = "Nama Lengkap,Email,No. WhatsApp,Hasil MBTI,Tanggal Tes,E (%),I (%),S (%),N (%),T (%),F (%),J (%),P (%)\n";
                savedSubmissions.forEach(sub => {
                    const row = [
                        `"${sub.name.replace(/"/g, '""')}"`,
                        `"${sub.email.replace(/"/g, '""')}"`,
                        `"${sub.whatsapp}"`,
                        `"${sub.mbti}"`,
                        `"${sub.formattedDate}"`,
                        `${sub.percentages?.E ?? 50}`,
                        `${sub.percentages?.I ?? 50}`,
                        `${sub.percentages?.S ?? 50}`,
                        `${sub.percentages?.N ?? 50}`,
                        `${sub.percentages?.T ?? 50}`,
                        `${sub.percentages?.F ?? 50}`,
                        `${sub.percentages?.J ?? 50}`,
                        `${sub.percentages?.P ?? 50}`
                    ].join(",");
                    csvContent += row + "\n";
                });

                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Hasil_Tes_MBTI_${new Date().toISOString().slice(0, 10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPassword === 'adminmbti123') {
                    setIsAdminLoggedIn(true);
                    setAdminError('');
                } else {
                    setAdminError('Kata sandi admin salah! Gunakan: adminmbti123');
                }
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Header */}
                    <header className="bg-slate-800 border-b border-slate-700 py-4 px-6 shadow-lg flex justify-between items-center">
                        <div className="flex items-center space-x-3 cursor-pointer" onClick={() => setStep('welcome')}>
                            <div className="bg-indigo-600 p-2 rounded-xl text-white shadow-md">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 10V3L4 14h7v7l9-11h-7z" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-white flex items-center">
                                    MBTI <span className="ml-2 text-xs bg-indigo-500/20 text-indigo-400 border border-indigo-500/30 px-2 py-0.5 rounded-full font-medium">Sync Pro</span>
                                </h1>
                                <p className="text-xs text-slate-400">Analisis Kepribadian & Ekspor Excel</p>
                            </div>
                        </div>
                        <button 
                            onClick={() => setStep(step === 'admin' ? 'welcome' : 'admin')}
                            className="bg-slate-700 hover:bg-slate-600 text-slate-100 text-sm font-semibold px-4 py-2 rounded-lg transition-colors flex items-center space-x-1.5"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0" />
                            </svg>
                            <span>{isAdminLoggedIn ? "Dasbor Admin" : "Admin Panel"}</span>
                        </button>
                    </header>

                    {/* Konten Utama */}
                    <main className="flex-grow flex items-center justify-center p-4 md:p-8 max-w-6xl mx-auto w-full">
                        
                        {/* 1. TAMPILAN WELCOME */}
                        {step === 'welcome' && (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 w-full items-center">
                                <div className="space-y-5">
                                    <span className="inline-block bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">
                                        Jung Typology Framework
                                    </span>
                                    <h2 className="text-4xl md:text-5xl font-extrabold text-white leading-tight">
                                        Analisis <span className="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">Kepribadian Sejati</span> Anda
                                    </h2>
                                    <p className="text-slate-300 leading-relaxed">
                                        Mulai tes gratis berdurasi 3 menit kami untuk memetakan kepribadian Anda dalam aspek karir, sosial, komunikasi, dan gaya belajar.
                                    </p>
                                    <div className="flex space-x-4">
                                        <div className="bg-slate-800 p-3 rounded-lg border border-slate-700 flex-1 text-center">
                                            <div className="text-indigo-400 font-bold text-xl">24 Soal</div>
                                            <div className="text-xs text-slate-400">Cepat & Seimbang</div>
                                        </div>
                                        <div className="bg-slate-800 p-3 rounded-lg border border-slate-700 flex-1 text-center">
                                            <div className="text-purple-400 font-bold text-xl">16 Tipe</div>
                                            <div className="text-xs text-slate-400">Laporan Akurat</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                                    <h3 className="text-xl font-bold mb-4 flex items-center text-white">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 mr-2 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                        </svg>
                                        Data Diri Responden
                                    </h3>
                                    <form onSubmit={handleStartTest} className="space-y-4">
                                        <div>
                                            <label className="block text-xs text-slate-400 font-bold uppercase mb-1">Nama Lengkap *</label>
                                            <input required type="text" value={userData.name} onChange={e => setUserData({...userData, name: e.target.value})} placeholder="Contoh: Hilmi" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-400 font-bold uppercase mb-1">Email Aktif *</label>
                                            <input required type="email" value={userData.email} onChange={e => setUserData({...userData, email: e.target.value})} placeholder="Contoh: nama@domain.com" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-400 font-bold uppercase mb-1">No. WhatsApp (Opsional)</label>
                                            <input type="tel" value={userData.whatsapp} onChange={e => setUserData({...userData, whatsapp: e.target.value})} placeholder="Contoh: 0812345678" className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                        </div>
                                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 px-6 rounded-xl shadow-lg shadow-indigo-600/30 flex justify-center items-center space-x-2 transition-all">
                                            <span>Mulai Tes Sekarang</span>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                            </svg>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {}
                        {/* 2. TAMPILAN TES JAWABAN */}
                        {step === 'test' && (
                            <div className="w-full max-w-3xl bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="text-xs bg-indigo-500/10 text-indigo-400 px-3 py-1 rounded-full border border-indigo-500/20 font-bold">
                                        SOAL {currentQIndex + 1} DARI {questions.length}
                                    </span>
                                    <span className="text-xs text-slate-400">{Math.round((currentQIndex / questions.length) * 100)}% Selesai</span>
                                </div>

                                <div className="w-full bg-slate-900 h-2 rounded-full mb-8 overflow-hidden">
                                    <div className="bg-indigo-500 h-full transition-all duration-300" style={{ width: `${(currentQIndex / questions.length) * 100}%` }}></div>
                                </div>

                                <div className="min-h-[120px] flex items-center justify-center text-center my-6">
                                    <p className="text-lg md:text-xl font-medium text-slate-100">
                                        "{questions[currentQIndex].text}"
                                    </p>
                                </div>

                                <div className="space-y-6 pt-4">
                                    <div className="flex flex-col md:flex-row justify-between items-center md:space-x-4 space-y-4 md:space-y-0">
                                        <span className="text-xs text-emerald-400 font-bold tracking-wider">SETUJU</span>
                                        
                                        <div className="flex items-center space-x-3 md:space-x-4">
                                            {/* Sangat Setuju */}
                                            <button onClick={() => handleAnswerSelect(2)} className="w-14 h-14 rounded-full bg-emerald-500/10 hover:bg-emerald-500 border-2 border-emerald-500 text-emerald-400 hover:text-white flex items-center justify-center font-bold text-lg transition-all scale-105 hover:scale-115">
                                                +2
                                            </button>
                                            {/* Setuju */}
                                            <button onClick={() => handleAnswerSelect(1)} className="w-12 h-12 rounded-full bg-emerald-500/5 hover:bg-emerald-500/80 border-2 border-emerald-500/40 text-emerald-300 hover:text-white flex items-center justify-center font-semibold text-sm transition-all hover:scale-110">
                                                +1
                                            </button>
                                            {/* Netral */}
                                            <button onClick={() => handleAnswerSelect(0)} className="w-10 h-10 rounded-full bg-slate-700 hover:bg-slate-600 border border-slate-500 text-slate-300 flex items-center justify-center text-xs transition-all hover:scale-110">
                                                0
                                            </button>
                                            {/* Tidak Setuju */}
                                            <button onClick={() => handleAnswerSelect(-1)} className="w-12 h-12 rounded-full bg-rose-500/5 hover:bg-rose-500/80 border-2 border-rose-500/40 text-rose-300 hover:text-white flex items-center justify-center font-semibold text-sm transition-all hover:scale-110">
                                                -1
                                            </button>
                                            {/* Sangat Tidak Setuju */}
                                            <button onClick={() => handleAnswerSelect(-2)} className="w-14 h-14 rounded-full bg-rose-500/10 hover:bg-rose-500 border-2 border-rose-500 text-rose-400 hover:text-white flex items-center justify-center font-bold text-lg transition-all scale-105 hover:scale-115">
                                                -2
                                            </button>
                                        </div>

                                        <span className="text-xs text-rose-400 font-bold tracking-wider">TIDAK SETUJU</span>
                                    </div>

                                    <div className="flex justify-between items-center border-t border-slate-700/60 pt-6 mt-8">
                                        <button 
                                            disabled={currentQIndex === 0} 
                                            onClick={() => setCurrentQIndex(prev => prev - 1)}
                                            className="text-slate-400 hover:text-white text-sm flex items-center space-x-1.5 disabled:opacity-30 transition-all"
                                        >
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                            </svg>
                                            <span>Kembali</span>
                                        </button>

                                        {currentQIndex === questions.length - 1 ? (
                                            <button 
                                                disabled={answers[questions[currentQIndex].id] === undefined} 
                                                onClick={calculateResult}
                                                className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-2.5 rounded-xl text-sm flex items-center space-x-1.5 shadow-md shadow-indigo-600/20 transition-all"
                                            >
                                                <span>Hitung Hasil</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                </svg>
                                            </button>
                                        ) : (
                                            <button 
                                                disabled={answers[questions[currentQIndex].id] === undefined} 
                                                onClick={() => setCurrentQIndex(prev => prev + 1)}
                                                className="text-indigo-400 hover:text-indigo-300 font-bold text-sm flex items-center space-x-1.5 transition-all"
                                            >
                                                <span>Lanjut</span>
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                                </svg>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {}
                        {/* 3. TAMPILAN LAPORAN HASIL KEPRIBADIAN */}
                        {step === 'result' && resultMBTI && mbtiDetails[resultMBTI] && (
                            <div className="w-full space-y-6">
                                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl relative overflow-hidden">
                                    <div className="absolute -top-12 -right-12 w-48 h-48 bg-indigo-500/10 rounded-full blur-2xl"></div>
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="text-center md:text-left space-y-2">
                                            <span className="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full font-bold">
                                                ANALISIS KEPRIBADIAN SELESAI
                                            </span>
                                            <p className="text-slate-400 text-sm mt-3">Halo <span className="text-white font-bold">{userData.name}</span>, tipe kepribadian Anda adalah:</p>
                                            <h3 className="text-5xl font-extrabold text-indigo-400 tracking-wider font-mono">{resultMBTI}</h3>
                                            <h4 className="text-xl font-bold text-white">Sang {mbtiDetails[resultMBTI].title}</h4>
                                        </div>

                                        <div className="bg-slate-900 border border-slate-700/60 p-4 rounded-xl w-full md:w-80 space-y-3">
                                            <h5 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Persentase Aspek Anda:</h5>
                                            
                                            {/* EI */}
                                            <div className="space-y-1">
                                                <div className="flex justify-between text-xs font-semibold">
                                                    <span>E ({scorePercentages.EI}%)</span>
                                                    <span>I ({100 - scorePercentages.EI}%)</span>
                                                </div>
                                                <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden flex">
                                                    <div className="bg-indigo-500 h-full" style={{ width: `${scorePercentages.EI}%` }}></div>
                                                    <div className="bg-purple-500 h-full" style={{ width: `${100 - scorePercentages.EI}%` }}></div>
                                                </div>
                                            </div>

                                            {/* SN */}
                                            <div className="space-y-1">
                                                <div className="flex justify-between text-xs font-semibold">
                                                    <span>S ({scorePercentages.SN}%)</span>
                                                    <span>N ({100 - scorePercentages.SN}%)</span>
                                                </div>
                                                <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden flex">
                                                    <div className="bg-indigo-500 h-full" style={{ width: `${scorePercentages.SN}%` }}></div>
                                                    <div className="bg-purple-500 h-full" style={{ width: `${100 - scorePercentages.SN}%` }}></div>
                                                </div>
                                            </div>

                                            {/* TF */}
                                            <div className="space-y-1">
                                                <div className="flex justify-between text-xs font-semibold">
                                                    <span>T ({scorePercentages.TF}%)</span>
                                                    <span>F ({100 - scorePercentages.TF}%)</span>
                                                </div>
                                                <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden flex">
                                                    <div className="bg-indigo-500 h-full" style={{ width: `${scorePercentages.TF}%` }}></div>
                                                    <div className="bg-purple-500 h-full" style={{ width: `${100 - scorePercentages.TF}%` }}></div>
                                                </div>
                                            </div>

                                            {/* JP */}
                                            <div className="space-y-1">
                                                <div className="flex justify-between text-xs font-semibold">
                                                    <span>J ({scorePercentages.JP}%)</span>
                                                    <span>P ({100 - scorePercentages.JP}%)</span>
                                                </div>
                                                <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden flex">
                                                    <div className="bg-indigo-500 h-full" style={{ width: `${scorePercentages.JP}%` }}></div>
                                                    <div className="bg-purple-500 h-full" style={{ width: `${100 - scorePercentages.JP}%` }}></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                                        <h5 className="font-bold text-white text-lg">Deskripsi Karakter</h5>
                                        <p className="text-sm text-slate-300 leading-relaxed">{mbtiDetails[resultMBTI].desc}</p>
                                        <h5 className="font-bold text-white pt-2">Kekuatan Utama</h5>
                                        <ul className="grid grid-cols-2 gap-2 text-xs">
                                            {mbtiDetails[resultMBTI].strengths.map((st, i) => (
                                                <li key={i} className="bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 px-3 py-2 rounded-lg flex items-center">
                                                    ✓ {st}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>

                                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                                        <h5 className="font-bold text-white text-lg">Rekomendasi Karir</h5>
                                        <div className="flex flex-wrap gap-2">
                                            {mbtiDetails[resultMBTI].careers.map((car, i) => (
                                                <span key={i} className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 px-3 py-1.5 rounded-lg text-xs font-medium">
                                                    {car}
                                                </span>
                                            ))}
                                        </div>
                                        <h5 className="font-bold text-white pt-2">Tantangan Pengembangan</h5>
                                        <ul className="text-xs space-y-2">
                                            {mbtiDetails[resultMBTI].weaknesses.map((we, i) => (
                                                <li key={i} className="bg-rose-500/10 border border-rose-500/20 text-rose-300 px-3 py-2 rounded-lg">
                                                    • {we}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>

                                <div className="flex justify-center">
                                    <button onClick={() => setStep('welcome')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-6 py-3 rounded-xl transition-all">
                                        Ulangi Tes MBTI
                                    </button>
                                </div>
                            </div>
                        )}

                        {}
                        {/* 4. TAMPILAN ADMIN */}
                        {step === 'admin' && (
                            <div className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                                {!isAdminLoggedIn ? (
                                    <div className="max-w-md mx-auto text-center py-6 space-y-4">
                                        <h3 className="text-xl font-bold text-white">Dasbor Admin</h3>
                                        <p className="text-xs text-slate-400">Gunakan kata sandi default untuk memantau data & ekspor ke Excel.</p>
                                        <form onSubmit={handleAdminLogin} className="space-y-4">
                                            <input required type="password" placeholder="Masukkan Password Admin" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                            {adminError && <p className="text-xs text-rose-400">{adminError}</p>}
                                            <p className="text-[10px] text-slate-500">Demo Password: <span className="font-mono text-indigo-400">adminmbti123</span></p>
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all">
                                                Masuk Dasbor
                                            </button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-700 pb-4">
                                            <div>
                                                <h3 className="text-xl font-bold text-white">Data Hasil Responden</h3>
                                                <p className="text-xs text-slate-400">Total {savedSubmissions.length} orang telah mengisi tes.</p>
                                            </div>
                                            <div className="flex space-x-2 w-full sm:w-auto">
                                                <button onClick={exportToExcel} className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-4 py-2.5 rounded-lg flex items-center space-x-1.5 transition-all">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                                    </svg>
                                                    <span>Ekspor ke Excel</span>
                                                </button>
                                                <button onClick={() => { setIsAdminLoggedIn(false); setAdminPassword(''); }} className="bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-bold px-3 py-2.5 rounded-lg transition-all">
                                                    Log Out
                                                </button>
                                            </div>
                                        </div>

                                        {savedSubmissions.length === 0 ? (
                                            <p className="text-center py-12 text-slate-500 text-sm">Belum ada data pendaftar.</p>
                                        ) : (
                                            <div className="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900/60">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-800 border-b border-slate-700 text-slate-400 uppercase font-semibold">
                                                            <th className="py-3 px-4">Nama</th>
                                                            <th className="py-3 px-4">Email / WA</th>
                                                            <th className="py-3 px-4 text-center">Hasil MBTI</th>
                                                            <th className="py-3 px-4 text-right">Tanggal</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-800 text-slate-300">
                                                        {savedSubmissions.map((sub, i) => (
                                                            <tr key={i} className="hover:bg-slate-800/40">
                                                                <td className="py-3.5 px-4 font-bold text-white">{sub.name}</td>
                                                                <td className="py-3.5 px-4">
                                                                    <div>{sub.email}</div>
                                                                    <div className="text-[10px] text-slate-500">WA: {sub.whatsapp}</div>
                                                                </td>
                                                                <td className="py-3.5 px-4 text-center">
                                                                    <span className="bg-indigo-500/10 text-indigo-400 font-bold px-2 py-1 rounded border border-indigo-500/20">
                                                                        {sub.mbti}
                                                                    </span>
                                                                </td>
                                                                <td className="py-3.5 px-4 text-right text-slate-500">{sub.formattedDate}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                    </main>

                    {/* Footer */}
                    <footer className="bg-slate-950/40 border-t border-slate-800/80 py-4 text-center text-[10px] text-slate-600">
                        <p>© 2026 MBTI Sync Pro. Dilengkapi Basis Data Real-time & Sistem Ekspor Excel Terintegrasi.</p>
                    </footer>
                </div>
            );
        }

        // Render aplikasi
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
