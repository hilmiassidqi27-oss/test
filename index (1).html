<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.getElementById('error-display');
            if (errDiv) {
                errDiv.innerHTML = `<div class="bg-rose-950/90 border-2 border-rose-500 text-rose-100 p-5 rounded-2xl max-w-2xl mx-auto shadow-2xl backdrop-blur-md space-y-2"><div class="flex items-center space-x-2 text-rose-400 font-bold"><span>Terjadi Kesalahan Sistem</span></div><p class="text-xs md:text-sm"><strong>Pesan Error:</strong> ${message}</p><p class="text-[11px] text-rose-300 font-mono">Lokasi: ${source}:${lineno}:${colno}</p></div>`;
                errDiv.classList.remove('hidden');
            }
            return false;
        };
    </script>

        // ── 40 SOAL MBTI (dari foto, Likert 1-5) ──

            // DIMENSI 4 — J vs P
            { id: 31, dim: "JP", direction:  1, text: "Saya datang siap kerja sebelum shift dimulai." },
            { id: 32, dim: "JP", direction: -1, text: "Saya nyaman menerima penugasan mendadak." },

            { id: 35, dim: "JP", direction:  1, text: "Saya menyukai jadwal kerja yang terstruktur." },
            { id: 36, dim: "JP", direction: -1, text: "Saya dapat improvisasi ketika terjadi gangguan operasional." },
            { id: 37, dim: "JP", direction:  1, text: "Saya membuat urutan pekerjaan berdasarkan prioritas." },
            { id: 38, dim: "JP", direction: -1, text: "Saya tetap efektif meskipun prioritas kerja berubah mendadak." },
            { id: 39, dim: "validity", direction: -1, text: "Saya kadang melewati beberapa prosedur kerja jika pekerjaan sangat mendesak. (R)" },
            { id: 40, dim: "validity", direction: -1, text: "Jika kondisi terlihat aman, penggunaan APD lengkap tidak selalu diperlukan. (R)" },
        ];

        // Soal MBTI saja (tanpa validity)
        const mbtiQuestions = questions.filter(q => q.dim !== "validity");

        const mbtiDetails = {
            ISTJ: { title: "Logistik / Inspektur", desc: "Individu yang praktis, mengutamakan fakta, sangat andal, dan berdedikasi tinggi pada aturan serta tradisi.", strengths: ["Jujur & Langsung", "Bertanggung Jawab", "Sangat Detail", "Tenang & Praktis"], weaknesses: ["Keras Kepala", "Kurang Sensitif terhadap Emosi", "Terlalu Kaku", "Suka Menyalahkan Diri"], careers: ["Akuntan", "Analis Keuangan", "Polisi/Militer", "Manajer Operasional"] },
            ISFJ: { title: "Pembela / Pelindung", desc: "Pribadi yang sangat hangat, penuh kasih, protektif, dan selalu siap membela orang-orang terdekat mereka.", strengths: ["Sangat Suportif", "Dapat Diandalkan", "Sangat Peka", "Pekerja Keras & Setia"], weaknesses: ["Terlalu Rendah Hati", "Terlalu Memendam Perasaan", "Sulit Menolak", "Gampang Stres"], careers: ["Perawat / Tenaga Medis", "Guru/Pendidik", "Pekerja Sosial", "Customer Service"] },
            INFJ: { title: "Advokat / Konselor", desc: "Tipe kepribadian paling langka. Idealis yang mistis namun sangat teratur, memiliki visi mendalam tentang manusia.", strengths: ["Kreatif", "Sangat Berprinsip", "Penuh Empati & Wawasan", "Bersemangat"], weaknesses: ["Sensitif terhadap Kritik", "Sangat Tertutup", "Perfeksionis", "Mudah Burnout"], careers: ["Penulis", "Psikolog / Konselor", "Aktivis Kemanusiaan", "HRD Specialist"] },
            INTJ: { title: "Arsitek / Ahli Strategi", desc: "Pemikir taktis yang imajinatif sekaligus bertekad kuat, sangat mandiri, dan mencintai efisiensi tinggi.", strengths: ["Berpikiran Logis & Analitis", "Sangat Mandiri", "Inovatif", "Berpengetahuan Luas"], weaknesses: ["Sering Terlihat Arogan", "Terlalu Kritis", "Kurang Peka secara Sosial", "Overthinking"], careers: ["Software Engineer", "Ilmuwan / Peneliti", "Ahli Strategi Bisnis", "Arsitek"] },
            ISTP: { title: "Pengrajin / Virtuoso", desc: "Eksperimenter yang berani dan praktis, ahli dalam menguasai segala jenis alat, mekanika, dan pemecahan masalah instan.", strengths: ["Optimis & Energetik", "Sangat Praktis", "Spontan & Kreatif", "Bagus dalam Krisis"], weaknesses: ["Sangat Keras Kepala", "Suka Menyendiri", "Mudah Bosan", "Kurang Suka Komitmen Kaku"], careers: ["Teknisi / Mekanik", "Pilot", "Ahli Forensik", "Pemadam Kebakaran"] },
            ISFP: { title: "Petualang / Seniman", desc: "Seniman yang fleksibel, menawan, selalu siap mengeksplorasi hal-hal baru dan mengekspresikan diri lewat karya nyata.", strengths: ["Sangat Menawan", "Sensitif terhadap Estetika", "Imajinatif", "Sangat Fleksibel"], weaknesses: ["Sangat Mandiri", "Sulit Diprediksi", "Mudah Stres", "Terlalu Kompetitif"], careers: ["Desainer Grafis", "Fotografer", "Koki / Chef", "Musisi / Pekerja Seni"] },
            INFP: { title: "Mediator / Idealis", desc: "Pribadi yang puitis, baik hati, altruistik, dan selalu bersemangat membantu tujuan-tujuan kemanusiaan yang baik.", strengths: ["Sangat Peduli & Empati", "Sangat Kreatif", "Berpikiran Terbuka", "Berkomitmen Tinggi"], weaknesses: ["Terlalu Idealis", "Sering Mengabaikan Fakta", "Terlalu Sensitif", "Sulit Didekati"], careers: ["Penulis / Novelis", "Psikolog", "Penerjemah Bahasa", "Pekerja Seni Kreatif"] },
            INTP: { title: "Logis / Pemikir", desc: "Penemu yang kreatif dengan rasa ingin tahu tinggi, sangat tertarik pada teori, sains, dan struktur analitis.", strengths: ["Sangat Analitis", "Orisinal & Kreatif", "Berpikiran Terbuka", "Sangat Jujur"], weaknesses: ["Sering Ragu-ragu", "Kurang Peka Perasaan", "Pelupa / Sulit Fokus", "Suka Meragukan Diri"], careers: ["Programmer / Data Scientist", "Fisikawan", "Analis Keamanan Siber", "Konsultan IT"] },
            ESTP: { title: "Pengusaha / Dinamis", desc: "Orang yang cerdas, bertenaga, sangat ramah, dan sangat menikmati hidup di tepi jurang aksi nyata dan petualangan.", strengths: ["Berani & Tegas", "Sangat Rasional", "Keterampilan Sosial Hebat", "Peka Perubahan"], weaknesses: ["Kurang Peka Perasaan", "Suka Risiko Berbahaya", "Tidak Suka Aturan Ketat", "Sering Tertinggal Detail"], careers: ["Wirausahawan", "Sales / Marketing", "Pialang Saham", "Detektif / Agen Rahasia"] },
            ESFP: { title: "Penghibur / Sosialis", desc: "Orang yang spontan, energik, bersemangat, dan selalu membuat suasana di sekitar mereka menjadi ceria dan hidup.", strengths: ["Sangat Menarik", "Suka Membantu Praktis", "Sosial Luar Biasa", "Sensitif Estetika"], weaknesses: ["Mudah Bosan", "Sulit Rencana Masa Depan", "Kurang Fokus Analisis", "Sensitif terhadap Konflik"], careers: ["Event Planner", "Aktor / Aktris", "Public Relations", "Pemandu Wisata"] },
            ENFP: { title: "Juru Kampanye / Inspirator", desc: "Jiwa yang bebas, antusias, kreatif, komunikator ulung, dan selalu bisa menemukan alasan untuk tersenyum.", strengths: ["Sangat Kreatif", "Penuh Energi", "Komunikator Ulung", "Sangat Ramah"], weaknesses: ["Sulit Menjaga Fokus", "Sangat Butuh Persetujuan", "Overthinking", "Mudah Stres"], careers: ["Content Creator", "Jurnalis", "Manajer Pemasaran", "Motivator"] },
            ENTP: { title: "Debat / Visioner", desc: "Pemikir cerdas yang tidak bisa menolak tantangan intelektual, sangat suka menganalisis argumen dari berbagai sudut.", strengths: ["Sangat Cerdas", "Pemikir Cepat", "Sangat Karismatik", "Suka Solusi Baru"], weaknesses: ["Sangat Suka Berdebat", "Kurang Toleran", "Sulit Fokus Implementasi", "Kurang Peka"], careers: ["Konsultan Bisnis", "Pengacara", "Product Manager", "Wirausahawan"] },
            ESTJ: { title: "Eksekutif / Administrator", desc: "Administrator ulung, tidak tertandingi dalam mengelola segala sesuatu, baik itu orang, aturan, maupun proyek.", strengths: ["Sangat Terorganisir", "Setia & Berdedikasi", "Jujur & Terpercaya", "Pembuat Ketertiban"], weaknesses: ["Kaku & Keras Kepala", "Sulit Terima Perubahan", "Terlalu Menuntut", "Kurang Ekspresif"], careers: ["Manajer Proyek", "Direktur Keuangan", "Kepala Sekolah", "Pejabat Pemerintah"] },
            ESFJ: { title: "Konsul / Penyedia", desc: "Orang-orang yang sangat sosial, peduli, populer, dan selalu bersemangat membantu sesama serta menjaga komunitas.", strengths: ["Rasa Tanggung Jawab Kuat", "Sangat Setia & Peduli", "Hebat Menjalin Hubungan", "Sangat Hangat"], weaknesses: ["Khawatir Status Sosial", "Sering Butuh Pujian", "Tidak Suka Perubahan Keras", "Menolak Konflik"], careers: ["Guru Sekolah", "Pekerja Sosial Medis", "Manajer HRD", "Hubungan Masyarakat"] },
            ENFJ: { title: "Protagonis / Pemimpin Karismatik", desc: "Pemimpin karismatik yang penuh inspirasi, mampu memikat pendengar dan memotivasi orang untuk mencapai potensi terbaik.", strengths: ["Sangat Karismatik", "Sangat Peduli", "Komunikator Ulung", "Pemimpin Alami"], weaknesses: ["Terlalu Idealistis", "Terlalu Peka Kritik", "Sering Korban Diri", "Sulit Keputusan Keras"], careers: ["Guru / Profesor", "Pemimpin Organisasi", "Konselor", "Aktivis LSM"] },
            ENTJ: { title: "Komandan / Pemimpin Strategis", desc: "Pemimpin visioner yang berani, bertekad kuat, selalu menemukan jalan atau menciptakan jalan baru untuk kesuksesan.", strengths: ["Sangat Efisien", "Percaya Diri Tinggi", "Bertekad Kuat", "Pemikir Strategis"], weaknesses: ["Keras Kepala", "Kurang Sabar", "Kurang Peka Emosi", "Sering Terlihat Kejam"], careers: ["CEO / Direktur Utama", "Konsultan Manajemen", "Venture Capitalist", "Pengacara Korporasi"] }
        };

        function App() {
            const [step, setStep] = React.useState('welcome');
            const [userData, setUserData] = React.useState({ name: '', nik: '', lokasi: '', jabatan: '', email: '', whatsapp: '' });
            const [answers, setAnswers] = React.useState({});
            const answersRef = React.useRef({});
            const [currentQIndex, setCurrentQIndex] = React.useState(0);
            const [resultMBTI, setResultMBTI] = React.useState(null);
            const [savedSubmissions, setSavedSubmissions] = React.useState([]);
            const [adminPassword, setAdminPassword] = React.useState('');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = React.useState(false);
            const [adminError, setAdminError] = React.useState('');
            const [scorePercentages, setScorePercentages] = React.useState({ EI: 50, SN: 50, TF: 50, JP: 50 });
            const [sortBy, setSortBy] = React.useState('date'); // 'date', 'nik', 'name'
            const [sortDir, setSortDir] = React.useState('desc');
            const [exportingAll, setExportingAll] = React.useState(false);
            const [exportProgress, setExportProgress] = React.useState(0);

            React.useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('admin') === 'true') {
                    setStep('admin');
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
                const localData = localStorage.getItem('mbti_submissions');
                if (localData) setSavedSubmissions(JSON.parse(localData));
                if (db) {
                    const unsubscribe = db.collection('mbti_submissions').onSnapshot((snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.timestamp - a.timestamp);
                        setSavedSubmissions(data);
                        localStorage.setItem('mbti_submissions', JSON.stringify(data));
                    }, (error) => console.error("Firebase error: ", error));
                    return () => unsubscribe();
                }
            }, []);

            const handleStartTest = (e) => {
                e.preventDefault();
                if (!userData.name.trim() || !userData.nik.trim() || !userData.lokasi.trim() || !userData.jabatan.trim()) {
                    alert("Nama Lengkap, NIK, Lokasi Kerja, dan Jabatan harus diisi!");
                    return;
                }
                setStep('test');
                setCurrentQIndex(0);
                setAnswers({});
                answersRef.current = {};
            };

            const handleAnswerSelect = (score) => {
                const currentQ = questions[currentQIndex];
                const newAnswers = { ...answersRef.current, [currentQ.id]: score };
                answersRef.current = newAnswers;
                setAnswers(newAnswers);
                if (currentQIndex < questions.length - 1) {
                    setTimeout(() => setCurrentQIndex(prev => prev + 1), 150);
                }
            };

            const calculateResult = () => {
                try {
                    const latestAnswers = answersRef.current;
                    let scores = { EI: 0, SN: 0, TF: 0, JP: 0 };
                    let counts = { EI: 0, SN: 0, TF: 0, JP: 0 };

                    mbtiQuestions.forEach(q => {
                        const raw = latestAnswers[q.id];
                        if (raw !== undefined) {
                            // Likert 1-5 → centre at 3: value = (raw - 3)
                            const val = (raw - 3) * q.direction;
                            scores[q.dim] += val;
                            counts[q.dim]++;
                        }
                    });

                    const maxPerDim = 2 * 8; // 8 soal per dim, max diff per soal = 2
                    const getPercentage = (score, dim) => {
                        const max = 2 * counts[dim];
                        return Math.round(((score + max) / (max * 2)) * 100);
                    };

                    const eiPct = getPercentage(scores.EI, 'EI');
                    const snPct = getPercentage(scores.SN, 'SN');
                    const tfPct = getPercentage(scores.TF, 'TF');
                    const jpPct = getPercentage(scores.JP, 'JP');

                    const mbtiString = [
                        eiPct >= 50 ? 'E' : 'I',
                        snPct >= 50 ? 'S' : 'N',
                        tfPct >= 50 ? 'T' : 'F',
                        jpPct >= 50 ? 'J' : 'P'
                    ].join('');

                    const submission = {
                        name: userData.name,
                        nik: userData.nik || '-',
                        lokasi: userData.lokasi || '-',
                        jabatan: userData.jabatan || '-',
                        email: userData.email,
                        whatsapp: userData.whatsapp || '-',
                        mbti: mbtiString,
                        percentages: { E: eiPct, I: 100-eiPct, S: snPct, N: 100-snPct, T: tfPct, F: 100-tfPct, J: jpPct, P: 100-jpPct },
                        timestamp: Date.now(),
                        formattedDate: new Date().toLocaleDateString('id-ID', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' })
                    };

                    setSavedSubmissions(prev => {
                        const updatedList = [submission, ...prev];
                        localStorage.setItem('mbti_submissions', JSON.stringify(updatedList));
                        return updatedList;
                    });
                    setScorePercentages({ EI: eiPct, SN: snPct, TF: tfPct, JP: jpPct });
                    setResultMBTI(mbtiString);
                    setStep('result');

                    if (db) {
                        db.collection('mbti_submissions').add(submission).catch(e => console.error("Gagal simpan ke cloud:", e));
                    }
                } catch (e) {
                    console.error("Error:", e);
                    alert("Terjadi kesalahan saat memproses hasil. Silakan coba lagi.");
                }
            };

            // ── Buat HTML card untuk satu responden ──
            const buildCardHTML = (sub) => {
                const detail = mbtiDetails[sub.mbti] || mbtiDetails['ISTJ'];
                const pct = sub.percentages || { E:50, I:50, S:50, N:50, T:50, F:50, J:50, P:50 };
                return `
                <div id="mbti-capture-card" style="width:900px;background:#0f172a;font-family:Arial,sans-serif;padding:40px;box-sizing:border-box;">
                  <div style="background:#1e293b;border-radius:16px;padding:32px 36px;margin-bottom:24px;border:1px solid #334155;position:relative;overflow:hidden;">
                    <div style="position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:rgba(99,102,241,0.08);border-radius:50%;"></div>
                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;">
                      <div style="flex:1;">

                        {/* 2. TES */}
                        {step === 'test' && (
                            <div className="w-full max-w-3xl bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                                <div className="flex justify-between items-center mb-6">
                                    <span className={`text-xs px-3 py-1 rounded-full border font-bold ${isValidityQ ? 'bg-amber-500/10 text-amber-400 border-amber-500/20' : 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20'}`}>
                                        {isValidityQ ? '🔍 SOAL VALIDITAS' : `SOAL ${currentQIndex + 1} DARI ${questions.length}`}
                                    </span>
                                    <span className="text-xs text-slate-400">{Math.round((currentQIndex / questions.length) * 100)}% Selesai</span>
                                </div>

                                <div className="w-full bg-slate-900 h-2 rounded-full mb-8 overflow-hidden">
                                    <div className="bg-indigo-500 h-full transition-all duration-300" style={{ width: `${(currentQIndex / questions.length) * 100}%` }}></div>
                                </div>

                                <div className="min-h-[130px] flex flex-col items-center justify-center text-center my-6 space-y-2">
                                    {isValidityQ && (
                                        <span className="text-[10px] bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2 py-0.5 rounded-full">Soal kejujuran — jawab sesuai kondisi nyata</span>
                                    )}
                                    <p className="text-lg md:text-xl font-medium text-slate-100">
                                        "{questions[currentQIndex].text}"
                                    </p>
                                </div>

                                {/* Skala Likert 1–5 */}
                                <div className="space-y-3 pt-4">
                                    <div className="flex justify-between text-[10px] text-slate-500 px-2 mb-1">
                                        <span>Sangat Tidak Setuju</span>
                                        <span>Netral</span>
                                        <span>Sangat Setuju</span>
                                    </div>
                                    <div className="flex justify-center items-end space-x-2 md:space-x-4">
                                        {[1,2,3,4,5].map(val => {
                                            const selected = answers[questions[currentQIndex].id] === val;
                                            const labels = {1:'STS',2:'TS',3:'N',4:'S',5:'SS'};
                                            const sizes = {1:'w-12 h-12',2:'w-11 h-11',3:'w-10 h-10',4:'w-11 h-11',5:'w-12 h-12'};
                                            const colors = {
                                                1: selected ? 'bg-rose-600 border-rose-500 text-white' : 'bg-rose-500/10 border-rose-500/50 text-rose-400 hover:bg-rose-500/30',
                                                2: selected ? 'bg-rose-400 border-rose-400 text-white' : 'bg-rose-500/5 border-rose-400/30 text-rose-300 hover:bg-rose-400/20',
                                                3: selected ? 'bg-slate-500 border-slate-400 text-white' : 'bg-slate-700 border-slate-500 text-slate-300 hover:bg-slate-600',
                                                4: selected ? 'bg-emerald-400 border-emerald-400 text-white' : 'bg-emerald-500/5 border-emerald-400/30 text-emerald-300 hover:bg-emerald-400/20',
                                                5: selected ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-emerald-500/10 border-emerald-500/50 text-emerald-400 hover:bg-emerald-500/30',
                                            };
                                            return (
                                                <button key={val} onClick={() => handleAnswerSelect(val)}
                                                    className={`${sizes[val]} rounded-full border-2 font-bold text-xs transition-all ${colors[val]} ${selected ? 'scale-110 shadow-lg' : 'hover:scale-105'}`}>
                                                    {labels[val]}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <div className="flex justify-center items-center space-x-6 text-[10px] text-slate-500 mt-1">
                                        <span>1 = Sangat Tidak Setuju</span>
                                        <span>3 = Netral</span>
                                        <span>5 = Sangat Setuju</span>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center border-t border-slate-700/60 pt-6 mt-8">
                                    <button disabled={currentQIndex === 0} onClick={() => setCurrentQIndex(prev => prev - 1)}
                                        className="text-slate-400 hover:text-white text-sm flex items-center space-x-1.5 disabled:opacity-30 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                        </svg>
                                        <span>Kembali</span>
                                    </button>

                                    {currentQIndex === questions.length - 1 ? (
                                        <button disabled={answers[questions[currentQIndex].id] === undefined}
                                            onClick={calculateResult}
                                            className="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 text-white font-bold px-6 py-2.5 rounded-xl text-sm flex items-center space-x-1.5 shadow-md shadow-indigo-600/20 transition-all">
                                            <span>Hitung Hasil</span>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                            </svg>
                                        </button>
                                    ) : (
                                        <button disabled={answers[questions[currentQIndex].id] === undefined}
                                            onClick={() => setCurrentQIndex(prev => prev + 1)}
                                            className="text-indigo-400 hover:text-indigo-300 disabled:opacity-30 font-bold text-sm flex items-center space-x-1.5 transition-all">
                                            <span>Lanjut</span>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                            </svg>
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 3. HASIL */}
                        {step === 'result' && resultMBTI && mbtiDetails[resultMBTI] && (
                            <div className="w-full space-y-6">
                                <div className="bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl relative overflow-hidden">
                                    <div className="absolute -top-12 -right-12 w-48 h-48 bg-indigo-500/10 rounded-full blur-2xl"></div>
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-6">
                                        <div className="text-center md:text-left space-y-2">
                                            <span className="text-xs bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-3 py-1 rounded-full font-bold">ANALISIS KEPRIBADIAN SELESAI</span>
                                            <p className="text-slate-400 text-sm mt-3">Halo <span className="text-white font-bold">{userData.name}</span>, tipe kepribadian Anda adalah:</p>
                                            <h3 className="text-5xl font-extrabold text-indigo-400 tracking-wider font-mono">{resultMBTI}</h3>
                                            <h4 className="text-xl font-bold text-white">Sang {mbtiDetails[resultMBTI].title}</h4>
                                            <p className="text-xs text-slate-500">NIK: {userData.nik} &nbsp;|&nbsp; Lokasi: {userData.lokasi} &nbsp;|&nbsp; Jabatan: {userData.jabatan}</p>
                                        </div>
                                        <div className="bg-slate-900 border border-slate-700/60 p-4 rounded-xl w-full md:w-80 space-y-3">
                                            <h5 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Persentase Aspek Anda:</h5>
                                            {[['EI','E','I'],['SN','S','N'],['TF','T','F'],['JP','J','P']].map(([key,l,r]) => (
                                                <div key={key} className="space-y-1">
                                                    <div className="flex justify-between text-xs font-semibold">
                                                        <span>{l} ({scorePercentages[key]}%)</span>
                                                        <span>{r} ({100-scorePercentages[key]}%)</span>
                                                    </div>
                                                    <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden flex">
                                                        <div className="bg-indigo-500 h-full" style={{ width: `${scorePercentages[key]}%` }}></div>
                                                        <div className="bg-purple-500 h-full" style={{ width: `${100-scorePercentages[key]}%` }}></div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                                        <h5 className="font-bold text-white text-lg">Deskripsi Karakter</h5>
                                        <p className="text-sm text-slate-300 leading-relaxed">{mbtiDetails[resultMBTI].desc}</p>
                                        <h5 className="font-bold text-white pt-2">Kekuatan Utama</h5>
                                        <ul className="grid grid-cols-2 gap-2 text-xs">
                                            {mbtiDetails[resultMBTI].strengths.map((st, i) => (
                                                <li key={i} className="bg-emerald-500/10 border border-emerald-500/20 text-emerald-300 px-3 py-2 rounded-lg flex items-center">✓ {st}</li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700 space-y-4">
                                        <h5 className="font-bold text-white text-lg">Rekomendasi Karir</h5>
                                        <div className="flex flex-wrap gap-2">
                                            {mbtiDetails[resultMBTI].careers.map((car, i) => (
                                                <span key={i} className="bg-indigo-500/10 border border-indigo-500/20 text-indigo-300 px-3 py-1.5 rounded-lg text-xs font-medium">{car}</span>
                                            ))}
                                        </div>
                                        <h5 className="font-bold text-white pt-2">Tantangan Pengembangan</h5>
                                        <ul className="text-xs space-y-2">
                                            {mbtiDetails[resultMBTI].weaknesses.map((we, i) => (
                                                <li key={i} className="bg-rose-500/10 border border-rose-500/20 text-rose-300 px-3 py-2 rounded-lg">• {we}</li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>

                                <div className="flex flex-wrap justify-center gap-3">
                                    <button onClick={downloadPDF} className="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-3 rounded-xl transition-all flex items-center space-x-2 shadow-lg shadow-indigo-600/30">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                        </svg>
                                        <span>Unduh Hasil (PDF)</span>
                                    </button>
                                    <button onClick={() => setStep('welcome')} className="bg-slate-700 hover:bg-slate-600 text-white font-semibold px-6 py-3 rounded-xl transition-all">
                                        Ulangi Tes MBTI
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 4. ADMIN */}
                        {step === 'admin' && (
                            <div className="w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 md:p-8 shadow-xl">
                                {!isAdminLoggedIn ? (
                                    <div className="max-w-md mx-auto text-center py-6 space-y-4">
                                        <h3 className="text-xl font-bold text-white">Dasbor Admin</h3>
                                        <p className="text-xs text-slate-400">Gunakan kata sandi default untuk memantau data & ekspor hasil.</p>
                                        <form onSubmit={handleAdminLogin} className="space-y-4">
                                            <input required type="password" placeholder="Masukkan Password Admin" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} className="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-center focus:outline-none focus:ring-2 focus:ring-indigo-500" />
                                            {adminError && <p className="text-xs text-rose-400">{adminError}</p>}
                                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all">Masuk Dasbor</button>
                                        </form>
                                    </div>
                                ) : (
                                    <div className="space-y-6">
                                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-700 pb-4">
                                            <div>
                                                <h3 className="text-xl font-bold text-white">Data Hasil Responden</h3>
                                                <p className="text-xs text-slate-400">Total {savedSubmissions.length} orang telah mengisi tes.</p>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {/* Ekspor Semua Gambar (ZIP) */}
                                                <button onClick={exportAllImages} disabled={exportingAll}
                                                    className="bg-emerald-600 hover:bg-emerald-500 disabled:opacity-60 text-white text-xs font-bold px-4 py-2.5 rounded-lg flex items-center space-x-1.5 transition-all">
                                                    {exportingAll ? (
                                                        <>
                                                            <div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                                            <span>Mengekspor {exportProgress}%...</span>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                                            </svg>
                                                            <span>Ekspor Semua Gambar (ZIP)</span>
                                                        </>
                                                    )}
                                                </button>
                                                <button onClick={() => { setIsAdminLoggedIn(false); setAdminPassword(''); }} className="bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs font-bold px-3 py-2.5 rounded-lg transition-all">Log Out</button>
                                            </div>
                                        </div>

                                        {/* Sort controls */}
                                        <div className="flex items-center space-x-2 text-xs">
                                            <span className="text-slate-500">Urutkan:</span>
                                            {[['nik','NIK'],['name','Nama'],['date','Tanggal']].map(([field, label]) => (
                                                <button key={field} onClick={() => toggleSort(field)}
                                                    className={`px-3 py-1.5 rounded-lg border font-semibold transition-all ${sortBy === field ? 'bg-indigo-600 border-indigo-500 text-white' : 'bg-slate-700 border-slate-600 text-slate-300 hover:bg-slate-600'}`}>
                                                    {label} {sortBy === field && (sortDir === 'asc' ? '↑' : '↓')}
                                                </button>
                                            ))}
                                        </div>

                                        {savedSubmissions.length === 0 ? (
                                            <p className="text-center py-12 text-slate-500 text-sm">Belum ada data pendaftar.</p>
                                        ) : (
                                            <div className="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900/60">
                                                <table className="w-full text-left text-xs border-collapse">
                                                    <thead>
                                                        <tr className="bg-slate-800 border-b border-slate-700 text-slate-400 uppercase font-semibold">
                                                            <th className="py-3 px-3">#</th>
                                                            <th className="py-3 px-3 cursor-pointer hover:text-white" onClick={() => toggleSort('name')}>Nama <SortIcon field="name" /></th>
                                                            <th className="py-3 px-3 cursor-pointer hover:text-white" onClick={() => toggleSort('nik')}>NIK <SortIcon field="nik" /></th>
                                                            <th className="py-3 px-3">Lokasi Kerja</th>
                                                            <th className="py-3 px-3">Jabatan</th>
                                                            <th className="py-3 px-3">Email / WA</th>
                                                            <th className="py-3 px-3 text-center">MBTI</th>
                                                            <th className="py-3 px-3 cursor-pointer hover:text-white text-right" onClick={() => toggleSort('date')}>Tanggal <SortIcon field="date" /></th>
                                                            <th className="py-3 px-3 text-center">Unduh</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-800 text-slate-300">
                                                        {sortedSubmissions.map((sub, i) => (
                                                            <tr key={i} className="hover:bg-slate-800/40">
                                                                <td className="py-3 px-3 text-slate-500">{i+1}</td>
                                                                <td className="py-3 px-3 font-bold text-white">{sub.name}</td>
                                                                <td className="py-3 px-3 font-mono text-slate-300">{sub.nik || '-'}</td>
                                                                <td className="py-3 px-3">
                                                                    <span className="bg-slate-700 text-slate-300 text-[10px] px-2 py-0.5 rounded">{sub.lokasi || '-'}</span>
                                                                </td>
                                                                <td className="py-3 px-3">
                                                                    <span className="bg-indigo-900/40 text-indigo-300 text-[10px] px-2 py-0.5 rounded">{sub.jabatan || '-'}</span>
                                                                </td>
                                                                <td className="py-3 px-3">
                                                                    <div>{sub.email}</div>
                                                                    <div className="text-[10px] text-slate-500">WA: {sub.whatsapp}</div>
                                                                </td>
                                                                <td className="py-3 px-3 text-center">
                                                                    <span className="bg-indigo-500/10 text-indigo-400 font-bold px-2 py-1 rounded border border-indigo-500/20">{sub.mbti}</span>
                                                                </td>
                                                                <td className="py-3 px-3 text-right text-slate-500">{sub.formattedDate}</td>
                                                                <td className="py-3 px-3 text-center">
                                                                    <button onClick={() => downloadResultImage(sub)} title="Unduh hasil sebagai gambar"
                                                                        className="bg-indigo-500/10 hover:bg-indigo-500 border border-indigo-500/30 text-indigo-400 hover:text-white p-1.5 rounded-lg transition-all">
                                                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                                                        </svg>
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="bg-slate-950/40 border-t border-slate-800/80 py-4 text-center text-[10px] text-slate-600">
                        <p>© 2026 MBTI Sync Pro. Tes Kepribadian Industri — 40 Soal Tervalidasi.</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
